os: unstable

platform:
    - x64

environment:
    global:
        CYG_ARCH: x86
        CYG_ROOT: C:/cygwin
    matrix:
        -   WODI_ARCH: 32
            MINGW_ARCH: i686
        -   WODI_ARCH: 64
            MINGW_ARCH: x86_64

init:
    - 'echo System architecture: %PLATFORM%'
    - appveyor DownloadFile "https://dl.dropbox.com/sh/t9ozci9rso9gij4/AADtoDkuFC9ALiLduQ73VOzla/wodi64.tar.xz" -FileName "C:/wodi64.tar.xz"
    - appveyor DownloadFile "https://dl.dropbox.com/sh/t9ozci9rso9gij4/AABS0ZGie-RdZDxyRaDKImWVa/wodi32.tar.xz" -FileName "C:/wodi32.tar.xz"

    - appveyor DownloadFile "https://dl.dropbox.com/sh/feldcwshtinmdo8/AAAaEK0cJoB1h6UDh4Vbvpaaa/packages32.tar.xz" -FileName "C:/packages32.tar.xz"
    - appveyor DownloadFile "https://dl.dropbox.com/sh/feldcwshtinmdo8/AADlqehWQ17xVWCW2GGHIo_za/packages64.tar.xz" -FileName "C:/packages64.tar.xz"

install:
    - if not exist "%CYG_ROOT%" mkdir "%CYG_ROOT%"
    - appveyor DownloadFile "http://cygwin.com/setup-%CYG_ARCH%.exe" -FileName "%CYG_ROOT%\setup.exe"
    - '"%CYG_ROOT%\setup.exe" -qnBWNd -R "%CYG_ROOT%" -P cygwin -P wget  -P dos2unix -P diffutils -P cpio -P make -P patch -P mingw64-%MINGW_ARCH%-gcc-core -P mingw64-%MINGW_ARCH%-gcc-g++ >NUL'
    - '%CYG_ROOT%/bin/bash -lc "cygcheck -dc cygwin"'
    - '%CYG_ROOT%/bin/bash -lc "cd \"$OLDPWD\" && ./appveyor/install.sh %WODI_ARCH% %MINGW_ARCH% wodi%WODI_ARCH%.tar.xz packages%WODI_ARCH%.tar.xz"'

build_script:
    - '%CYG_ROOT%/bin/bash -lc "cd \"$OLDPWD\" && ./appveyor/build.sh %WODI_ARCH%"'

artifacts:
  - path: test.log
    name: test-logs
